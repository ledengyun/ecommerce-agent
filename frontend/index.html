<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商选品 Agent - 控制台</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1400px;
            margin: 0 auto;
        }

        header {
            background: white;
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        header .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0fdf4;
            border-radius: 20px;
            color: #16a34a;
            font-size: 14px;
        }

        .status-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }

        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
            transition: transform 0.2s;
        }

        .stat-card:hover {
            transform: translateY(-2px);
        }

        .stat-card .label {
            color: #6b7280;
            font-size: 14px;
            margin-bottom: 8px;
        }

        .stat-card .value {
            font-size: 32px;
            font-weight: bold;
            color: #1f2937;
        }

        .stat-card .trend {
            font-size: 13px;
            color: #16a34a;
            margin-top: 8px;
        }

        .main-content {
            display: grid;
            grid-template-columns: 1fr 400px;
            gap: 24px;
        }

        @media (max-width: 1024px) {
            .main-content {
                grid-template-columns: 1fr;
            }
        }

        .panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
        }

        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }

        .panel-title {
            font-size: 18px;
            font-weight: 600;
            color: #1f2937;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f3f4f6;
            color: #374151;
        }

        .btn-secondary:hover {
            background: #e5e7eb;
        }

        .product-list {
            max-height: 600px;
            overflow-y: auto;
        }

        .product-item {
            display: flex;
            gap: 16px;
            padding: 16px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 12px;
            transition: all 0.2s;
        }

        .product-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }

        .product-image {
            width: 80px;
            height: 80px;
            border-radius: 6px;
            background: #f3f4f6;
            object-fit: cover;
        }

        .product-info {
            flex: 1;
            min-width: 0;
        }

        .product-title {
            font-size: 14px;
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 8px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }

        .product-meta {
            display: flex;
            gap: 16px;
            font-size: 13px;
            color: #6b7280;
        }

        .product-meta .price {
            color: #dc2626;
            font-weight: 600;
        }

        .product-meta .profit {
            color: #16a34a;
            font-weight: 600;
        }

        .badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 12px;
            font-weight: 500;
        }

        .badge-success {
            background: #dcfce7;
            color: #166534;
        }

        .badge-warning {
            background: #fef3c7;
            color: #92400e;
        }

        .badge-info {
            background: #dbeafe;
            color: #1e40af;
        }

        .action-panel {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        .action-item {
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }

        .action-item h4 {
            font-size: 14px;
            color: #374151;
            margin-bottom: 8px;
        }

        .action-item p {
            font-size: 13px;
            color: #6b7280;
            margin-bottom: 12px;
        }

        .logs-container {
            background: #1f2937;
            border-radius: 8px;
            padding: 16px;
            max-height: 400px;
            overflow-y: auto;
            font-family: 'Courier New', monospace;
            font-size: 12px;
            color: #10b981;
        }

        .log-line {
            margin-bottom: 4px;
            word-break: break-all;
        }

        .empty-state {
            text-align: center;
            padding: 48px 24px;
            color: #9ca3af;
        }

        .empty-state svg {
            width: 64px;
            height: 64px;
            margin-bottom: 16px;
            opacity: 0.5;
        }

        .loading {
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
        }

        .spinner {
            width: 32px;
            height: 32px;
            border: 3px solid #e5e7eb;
            border-top-color: #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .progress-bar {
            height: 4px;
            background: #e5e7eb;
            border-radius: 2px;
            overflow: hidden;
            margin-top: 12px;
        }

        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }

        .tab-container {
            margin-bottom: 20px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid #e5e7eb;
            padding-bottom: 12px;
        }

        .tab {
            padding: 8px 16px;
            border: none;
            background: none;
            font-size: 14px;
            color: #6b7280;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }

        .tab:hover {
            background: #f3f4f6;
        }

        .tab.active {
            background: #667eea;
            color: white;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>
                🛍️ 电商选品 Agent
                <span style="font-size: 14px; color: #6b7280; font-weight: normal;">控制台</span>
            </h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="statusText">系统运行中</span>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总商品数</div>
                <div class="value" id="totalProducts">-</div>
                <div class="trend" id="totalTrend"></div>
            </div>
            <div class="stat-card">
                <div class="label">推荐商品</div>
                <div class="value" id="recommendedProducts">-</div>
                <div class="trend" id="recTrend"></div>
            </div>
            <div class="stat-card">
                <div class="label">平均利润率</div>
                <div class="value" id="avgMargin">-</div>
                <div class="trend" id="marginTrend"></div>
            </div>
            <div class="stat-card">
                <div class="label">最后更新</div>
                <div class="value" style="font-size: 18px;" id="lastUpdate">-</div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧：商品列表 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">商品列表</div>
                    <div class="tab-container">
                        <div class="tabs">
                            <button class="tab active" onclick="switchTab('all')">全部</button>
                            <button class="tab" onclick="switchTab('recommended')">推荐</button>
                        </div>
                    </div>
                </div>
                <div class="product-list" id="productList">
                    <div class="loading">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>

            <!-- 右侧：操作面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">快速操作</div>
                </div>
                <div class="action-panel">
                    <div class="action-item">
                        <h4>📊 利润分析</h4>
                        <p>对已导入的商品进行利润分析，筛选高利润商品</p>
                        <button class="btn btn-primary" onclick="startAnalysis()" id="analyzeBtn">
                            开始分析
                        </button>
                        <div class="progress-bar" id="analysisProgress" style="display: none;">
                            <div class="progress-fill" style="width: 0%"></div>
                        </div>
                    </div>

                    <div class="action-item">
                        <h4>📥 导入商品</h4>
                        <p>从 1688 导入商品数据（使用浏览器插件或手动导入）</p>
                        <button class="btn btn-secondary" onclick="showImportGuide()">
                            查看导入指南
                        </button>
                    </div>

                    <div class="action-item">
                        <h4>📋 系统日志</h4>
                        <p>查看最近的系统运行日志</p>
                        <button class="btn btn-secondary" onclick="loadLogs()">
                            刷新日志
                        </button>
                    </div>
                </div>

                <div style="margin-top: 24px;">
                    <div class="panel-title" style="margin-bottom: 12px;">实时日志</div>
                    <div class="logs-container" id="logsContainer">
                        <div style="color: #6b7280;">暂无日志...</div>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        const API_BASE = '';
        let currentTab = 'all';
        let allProducts = [];
        let recommendedProducts = [];

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadProducts();
            loadLogs();
            // 每 30 秒刷新一次
            setInterval(() => {
                loadStats();
                loadLogs();
            }, 30000);
        });

        // 加载统计数据
        async function loadStats() {
            try {
                const res = await fetch(`${API_BASE}/api/stats`);
                const stats = await res.json();
                
                document.getElementById('totalProducts').textContent = stats.total_products || 0;
                document.getElementById('recommendedProducts').textContent = stats.recommended_products || 0;
                document.getElementById('avgMargin').textContent = stats.avg_profit_margin ? `${stats.avg_profit_margin.toFixed(1)}%` : '-';
                
                if (stats.last_updated) {
                    const date = new Date(stats.last_updated);
                    document.getElementById('lastUpdate').textContent = date.toLocaleString('zh-CN');
                }
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        // 加载商品列表
        async function loadProducts() {
            try {
                const res = await fetch(`${API_BASE}/api/recommendations`);
                recommendedProducts = await res.json();
                
                const res2 = await fetch(`${API_BASE}/api/products`);
                allProducts = await res2.json();
                
                renderProducts();
            } catch (e) {
                console.error('加载商品失败:', e);
                document.getElementById('productList').innerHTML = `
                    <div class="empty-state">
                        <p>加载失败，请刷新页面重试</p>
                    </div>
                `;
            }
        }

        // 渲染商品列表
        function renderProducts() {
            const container = document.getElementById('productList');
            const products = currentTab === 'recommended' ? recommendedProducts : allProducts;
            
            if (!products || products.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <svg fill="none" stroke="currentColor" viewBox="0 0 24 24">
                            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M20 13V6a2 2 0 00-2-2H6a2 2 0 00-2 2v7m16 0v5a2 2 0 01-2 2H6a2 2 0 01-2-2v-5m16 0h-2.586a1 1 0 00-.707.293l-2.414 2.414a1 1 0 01-.707.293h-3.172a1 1 0 01-.707-.293l-2.414-2.414A1 1 0 006.586 13H4"/>
                        </svg>
                        <p>暂无商品数据</p>
                        <p style="font-size: 13px; margin-top: 8px;">请先导入商品或运行利润分析</p>
                    </div>
                `;
                return;
            }
            
            container.innerHTML = products.slice(0, 50).map(product => `
                <div class="product-item">
                    <img class="product-image" 
                         src="${product.image_url || 'data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%23d1d5db%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z%22%3E%3C/path%3E%3C/svg%3E'}" 
                         alt="${product.title}"
                         onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%23d1d5db%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z%22%3E%3C/path%3E%3C/svg%3E'">
                    <div class="product-info">
                        <div class="product-title">${product.title || '未知商品'}</div>
                        <div class="product-meta">
                            <span class="price">供货：${product.supplier_price || product.price || '-'}</span>
                            ${product.retail_price ? `<span>建议零售：${product.retail_price}</span>` : ''}
                            ${product.profit_margin ? `<span class="profit">利润：${(product.profit_margin * 100).toFixed(1)}%</span>` : ''}
                        </div>
                        ${product.recommend ? '<span class="badge badge-success" style="margin-top: 8px;">✅ 推荐</span>' : ''}
                    </div>
                </div>
            `).join('');
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            renderProducts();
        }

        // 开始利润分析
        async function startAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const progress = document.getElementById('analysisProgress');
            const progressFill = progress.querySelector('.progress-fill');
            
            btn.disabled = true;
            btn.textContent = '分析中...';
            progress.style.display = 'block';
            
            try {
                const res = await fetch(`${API_BASE}/api/analyze`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ min_profit_margin: 0.3 })
                });
                
                const task = await res.json();
                
                // 轮询任务状态
                const pollInterval = setInterval(async () => {
                    const statusRes = await fetch(`${API_BASE}/api/tasks/${task.task_id}`);
                    const status = await statusRes.json();
                    
                    progressFill.style.width = `${status.progress}%`;
                    
                    if (status.status === 'completed' || status.status === 'failed') {
                        clearInterval(pollInterval);
                        btn.disabled = false;
                        btn.textContent = '开始分析';
                        progress.style.display = 'none';
                        
                        if (status.status === 'completed') {
                            loadStats();
                            loadProducts();
                            alert('✅ 分析完成！');
                        } else {
                            alert('❌ 分析失败：' + status.message);
                        }
                    }
                }, 1000);
                
            } catch (e) {
                console.error('分析失败:', e);
                btn.disabled = false;
                btn.textContent = '开始分析';
                progress.style.display = 'none';
                alert('启动分析任务失败，请重试');
            }
        }

        // 显示导入指南
        function showImportGuide() {
            alert(`📥 商品导入指南

1. 访问 1688.com 搜索商品
2. 按 F12 打开开发者工具 → Console
3. 运行项目中的 scripts/extract_1688.js 脚本
4. 复制输出的 JSON 数据
5. 保存为 data/1688_products.json
6. 点击"开始分析"进行利润分析

详细指南请查看项目文档：QUICKSTART.md`);
        }

        // 加载日志
        async function loadLogs() {
            try {
                const res = await fetch(`${API_BASE}/api/logs?lines=50`);
                const data = await res.json();
                
                const container = document.getElementById('logsContainer');
                if (data.logs && data.logs.length > 0) {
                    container.innerHTML = data.logs.map(line => 
                        `<div class="log-line">${escapeHtml(line)}</div>`
                    ).join('');
                } else {
                    container.innerHTML = '<div style="color: #6b7280;">暂无日志...</div>';
                }
            } catch (e) {
                console.error('加载日志失败:', e);
            }
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }
    </script>
</body>
</html>

<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>电商选品 Agent - 控制台</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }
        .container { max-width: 1400px; margin: 0 auto; }
        
        header {
            background: white;
            border-radius: 12px;
            padding: 24px 32px;
            margin-bottom: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        
        header h1 {
            color: #333;
            font-size: 28px;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        
        .status {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px 16px;
            background: #f0fdf4;
            border-radius: 20px;
            color: #16a34a;
            font-size: 14px;
        }
        
        .status-dot {
            width: 8px;
            height: 8px;
            background: #16a34a;
            border-radius: 50%;
            animation: pulse 2s infinite;
        }
        
        @keyframes pulse {
            0%, 100% { opacity: 1; }
            50% { opacity: 0.5; }
        }
        
        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 24px;
        }
        
        .stat-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .stat-card .label { color: #6b7280; font-size: 14px; margin-bottom: 8px; }
        .stat-card .value { font-size: 28px; font-weight: bold; color: #1f2937; }
        
        .main-content {
            display: grid;
            grid-template-columns: 1fr 350px;
            gap: 24px;
        }
        
        @media (max-width: 1024px) {
            .main-content { grid-template-columns: 1fr; }
        }
        
        /* 采集功能样式 */
        .platform-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 16px;
            margin-bottom: 24px;
        }
        
        .platform-card {
            background: white;
            border-radius: 12px;
            padding: 20px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
            cursor: pointer;
            transition: all 0.2s;
            border: 2px solid transparent;
        }
        
        .platform-card:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 12px rgba(0,0,0,0.15);
        }
        
        .platform-card.selected {
            border-color: #667eea;
            background: #f5f3ff;
        }
        
        .platform-card h3 {
            font-size: 18px;
            color: #1f2937;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 8px;
        }
        
        .platform-card p {
            font-size: 13px;
            color: #6b7280;
            line-height: 1.5;
        }
        
        .platform-badge {
            display: inline-block;
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 600;
            margin-left: 8px;
        }
        
        .badge-free { background: #dcfce7; color: #166534; }
        .badge-api { background: #dbeafe; color: #1e40af; }
        
        .input-group {
            margin-bottom: 16px;
        }
        
        .input-group label {
            display: block;
            font-size: 14px;
            font-weight: 500;
            color: #374151;
            margin-bottom: 8px;
        }
        
        .input-group input,
        .input-group select {
            width: 100%;
            padding: 10px 14px;
            border: 1px solid #d1d5db;
            border-radius: 8px;
            font-size: 14px;
            transition: all 0.2s;
        }
        
        .input-group input:focus,
        .input-group select:focus {
            outline: none;
            border-color: #667eea;
            box-shadow: 0 0 0 3px rgba(102, 126, 234, 0.1);
        }
        
        .collection-status {
            background: #f9fafb;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .status-item {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 8px 0;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .status-item:last-child {
            border-bottom: none;
        }
        
        .panel {
            background: white;
            border-radius: 12px;
            padding: 24px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        
        .panel-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid #e5e7eb;
        }
        
        .panel-title { font-size: 18px; font-weight: 600; color: #1f2937; }
        
        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            cursor: pointer;
            transition: all 0.2s;
        }
        
        .btn-primary {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
        }
        
        .btn-primary:hover {
            transform: translateY(-1px);
            box-shadow: 0 4px 12px rgba(102, 126, 234, 0.4);
        }
        
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
        }
        
        .product-list {
            max-height: 600px;
            overflow-y: auto;
        }
        
        .product-item {
            display: flex;
            gap: 12px;
            padding: 12px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 10px;
            transition: all 0.2s;
            cursor: pointer;
        }
        
        .product-item:hover {
            border-color: #667eea;
            box-shadow: 0 2px 8px rgba(102, 126, 234, 0.15);
        }
        
        .product-item.selected {
            border-color: #667eea;
            background: #f5f3ff;
        }
        
        .product-image {
            width: 60px;
            height: 60px;
            border-radius: 6px;
            background: #f3f4f6;
            object-fit: cover;
        }
        
        .product-info { flex: 1; min-width: 0; }
        
        .product-title {
            font-size: 13px;
            font-weight: 500;
            color: #1f2937;
            margin-bottom: 6px;
            overflow: hidden;
            text-overflow: ellipsis;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
        }
        
        .product-meta {
            display: flex;
            gap: 12px;
            font-size: 12px;
            color: #6b7280;
        }
        
        .product-meta .price { color: #dc2626; font-weight: 600; }
        .product-meta .profit { color: #16a34a; font-weight: 600; }
        
        .badge {
            display: inline-block;
            padding: 2px 8px;
            border-radius: 4px;
            font-size: 11px;
            font-weight: 500;
            margin-top: 4px;
        }
        
        .badge-success { background: #dcfce7; color: #166534; }
        .badge-warning { background: #fef3c7; color: #92400e; }
        
        .action-panel { display: flex; flex-direction: column; gap: 16px; }
        
        .action-item {
            padding: 16px;
            background: #f9fafb;
            border-radius: 8px;
            border: 1px solid #e5e7eb;
        }
        
        .action-item h4 { font-size: 14px; color: #374151; margin-bottom: 8px; }
        .action-item p { font-size: 13px; color: #6b7280; margin-bottom: 12px; }
        
        .progress-bar {
            height: 6px;
            background: #e5e7eb;
            border-radius: 3px;
            overflow: hidden;
            margin-top: 12px;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea 0%, #764ba2 100%);
            transition: width 0.3s;
        }
        
        .result-box {
            background: #f0fdf4;
            border: 1px solid #86efac;
            border-radius: 8px;
            padding: 16px;
            margin-top: 16px;
        }
        
        .result-box h4 {
            color: #166534;
            font-size: 14px;
            margin-bottom: 8px;
        }
        
        .result-stats {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 8px;
            font-size: 13px;
            color: #166534;
        }
        
        .empty-state {
            text-align: center;
            padding: 40px 20px;
            color: #9ca3af;
        }
        
        .tabs {
            display: flex;
            gap: 8px;
            margin-bottom: 16px;
        }
        
        .tab {
            padding: 8px 16px;
            border: none;
            background: #f3f4f6;
            font-size: 14px;
            color: #6b7280;
            cursor: pointer;
            border-radius: 6px;
            transition: all 0.2s;
        }
        
        .tab.active {
            background: #667eea;
            color: white;
        }
        
        .checkbox {
            width: 18px;
            height: 18px;
            margin-right: 8px;
            cursor: pointer;
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🛍️ 电商选品 Agent <span style="font-size: 14px; color: #6b7280;">控制台</span></h1>
            <div class="status">
                <span class="status-dot"></span>
                <span id="statusText">系统运行中</span>
            </div>
        </header>

        <!-- 统计卡片 -->
        <div class="stats-grid">
            <div class="stat-card">
                <div class="label">总商品数</div>
                <div class="value" id="totalProducts">-</div>
            </div>
            <div class="stat-card">
                <div class="label">未分析</div>
                <div class="value" id="unanalyzedCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">已分析</div>
                <div class="value" id="analyzedCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">推荐商品</div>
                <div class="value" id="recommendedCount">-</div>
            </div>
            <div class="stat-card">
                <div class="label">平均利润率</div>
                <div class="value" id="avgProfitMargin" style="color: #16a34a;">-</div>
            </div>
        </div>

        <!-- 主内容区 -->
        <div class="main-content">
            <!-- 左侧：功能面板 -->
            <div class="panel">
                <!-- 主导航标签 -->
                <div class="tabs" style="margin-bottom: 20px;">
                    <button class="tab active" onclick="switchMainTab('collect')">📊 商品采集</button>
                    <button class="tab" onclick="switchMainTab('products')">📦 商品列表</button>
                </div>
                
                <!-- 商品采集面板 -->
                <div id="collectPanel" style="display: block;">
                    <div class="panel-header" style="margin-bottom: 16px;">
                        <div class="panel-title">选择采集平台</div>
                    </div>
                    
                    <div class="platform-grid">
                        <div class="platform-card" onclick="togglePlatform('1688', this)">
                            <h3>🇨🇳 1688 <span class="platform-badge badge-free">免费</span></h3>
                            <p>人工辅助采集，稳定可靠。使用浏览器脚本自动提取商品数据。</p>
                        </div>
                        
                        <div class="platform-card" onclick="togglePlatform('temu', this)">
                            <h3>🌏 Temu <span class="platform-badge badge-api">API</span></h3>
                            <p>第三方 API 采集，需要 API 密钥。支持自动搜索和提取。</p>
                        </div>
                        
                        <div class="platform-card" onclick="togglePlatform('amazon', this)" style="opacity: 0.6;">
                            <h3>🇺🇸 Amazon <span class="platform-badge badge-api">API</span></h3>
                            <p>第三方 API 采集（开发中）。支持 Amazon 商品搜索。</p>
                        </div>
                    </div>
                    
                    <div class="input-group">
                        <label for="collectKeyword">搜索关键词</label>
                        <input type="text" id="collectKeyword" placeholder="例如：home goods, kitchen gadgets, electronics" value="home goods">
                    </div>
                    
                    <div class="input-group">
                        <label for="collectLimit">每个平台采集数量</label>
                        <select id="collectLimit">
                            <option value="10">10 个商品</option>
                            <option value="20" selected>20 个商品</option>
                            <option value="50">50 个商品</option>
                            <option value="100">100 个商品</option>
                        </select>
                    </div>
                    
                    <button class="btn btn-primary" onclick="startCollection()" id="collectBtn" style="width: 100%;">
                        🚀 开始采集
                    </button>
                    
                    <div id="collectStatus" class="collection-status" style="display: none;">
                        <h4 style="font-size: 14px; color: #374151; margin-bottom: 12px;">📈 采集进度</h4>
                        <div id="collectProgressItems"></div>
                    </div>
                </div>
                
                <!-- 商品列表面板 -->
                <div id="productsPanel" style="display: none;">
                    <div class="panel-header" style="margin-bottom: 16px;">
                        <div class="panel-title">商品列表</div>
                    </div>
                    
                    <div class="tabs">
                        <button class="tab active" onclick="switchTab('analyzed')">已分析 (<span id="analyzedTabCount">0</span>)</button>
                        <button class="tab" onclick="switchTab('unanalyzed')">未分析 (<span id="unanalyzedTabCount">0</span>)</button>
                    </div>
                
                <div style="margin-bottom: 12px; font-size: 13px; color: #6b7280;" id="selectAllContainer">
                    <label style="display: flex; align-items: center; cursor: pointer;">
                        <input type="checkbox" class="checkbox" id="selectAll" onchange="toggleSelectAll()">
                        <span id="selectAllText">全选（用于批量分析）</span>
                    </label>
                </div>
                
                <div class="product-list" id="productList">
                    <div class="empty-state">加载中...</div>
                </div>
            </div>

            <!-- 右侧：操作面板 -->
            <div class="panel">
                <div class="panel-header">
                    <div class="panel-title">操作</div>
                </div>
                
                <div class="action-panel">
                    <div class="action-item">
                        <h4>📊 利润分析</h4>
                        <p id="analyzeHint">从未分析商品中选择，或留空自动选择</p>
                        <button class="btn btn-primary" onclick="startAnalysis()" id="analyzeBtn">
                            开始分析
                        </button>
                        <div class="progress-bar" id="progressBar" style="display: none;">
                            <div class="progress-fill" id="progressFill" style="width: 0%"></div>
                        </div>
                        <p id="progressText" style="font-size: 12px; color: #6b7280; margin-top: 8px;"></p>
                    </div>
                    
                    <div class="action-item">
                        <h4>📋 最近分析结果</h4>
                        <div id="latestResult" class="result-box" style="display: none;">
                            <h4>✅ 分析完成</h4>
                            <div class="result-stats">
                                <div>分析：<span id="resultTotal">0</span>个</div>
                                <div>推荐：<span id="resultRecommended">0</span>个</div>
                                <div>平均利润：<span id="resultAvgMargin">0</span>%</div>
                            </div>
                        </div>
                        <p id="noResultText" style="font-size: 13px; color: #6b7280;">暂无分析结果</p>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <script>
        let currentMainTab = 'collect';  // 默认显示采集面板
        let currentTab = 'analyzed';  // 商品列表默认显示已分析
        let unanalyzedProducts = [];
        let analyzedProducts = [];
        let selectedProducts = new Set();
        let currentTaskId = null;
        let selectedPlatforms = new Set();

        // 初始化
        document.addEventListener('DOMContentLoaded', () => {
            loadStats();
            loadProducts();
            loadLatestResult();
            
            // 初始化时隐藏全选框（因为默认是已分析标签）
            const selectAllContainer = document.getElementById('selectAllContainer');
            if (selectAllContainer) {
                selectAllContainer.style.display = 'none';
            }
            
            setInterval(() => {
                loadStats();
                if (currentTaskId) pollTaskStatus();
            }, 5000);
        });

        // 切换主标签（采集/商品）
        function switchMainTab(tab) {
            currentMainTab = tab;
            
            // 更新标签样式
            document.querySelectorAll('.tabs:first-of-type .tab').forEach(t => {
                t.classList.remove('active');
            });
            event.target.classList.add('active');
            
            // 切换面板显示
            const collectPanel = document.getElementById('collectPanel');
            const productsPanel = document.getElementById('productsPanel');
            
            if (tab === 'collect') {
                // 商品采集：只显示采集面板，隐藏商品列表
                collectPanel.style.display = 'block';
                productsPanel.style.display = 'none';
            } else {
                // 商品管理：隐藏采集面板，显示商品列表
                collectPanel.style.display = 'none';
                productsPanel.style.display = 'block';
                loadProducts();  // 刷新商品列表
            }
        }

        // 选择/取消选择平台
        function togglePlatform(platform, card) {
            if (selectedPlatforms.has(platform)) {
                selectedPlatforms.delete(platform);
                card.classList.remove('selected');
            } else {
                selectedPlatforms.add(platform);
                card.classList.add('selected');
            }
        }

        // 开始采集
        async function startCollection() {
            const keyword = document.getElementById('collectKeyword').value;
            const limit = parseInt(document.getElementById('collectLimit').value);
            const btn = document.getElementById('collectBtn');
            const statusDiv = document.getElementById('collectStatus');
            const progressDiv = document.getElementById('collectProgressItems');
            
            if (!keyword) {
                alert('请输入搜索关键词');
                return;
            }
            
            if (selectedPlatforms.size === 0) {
                alert('请至少选择一个采集平台');
                return;
            }
            
            btn.disabled = true;
            btn.textContent = '采集中...';
            statusDiv.style.display = 'block';
            
            const platforms = Array.from(selectedPlatforms);
            progressDiv.innerHTML = platforms.map(p => `
                <div class="status-item">
                    <span>${p.toUpperCase()}</span>
                    <span id="status-${p}">⏳ 采集中...</span>
                </div>
            `).join('');
            
            try {
                const response = await fetch('/api/collect', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        keyword: keyword,
                        platforms: platforms,
                        limit: limit
                    })
                });
                
                if (!response.ok) {
                    const error = await response.json();
                    throw new Error(error.detail || '采集失败');
                }
                
                const result = await response.json();
                
                // 更新状态
                if (result.results) {
                    platforms.forEach(p => {
                        const statusEl = document.getElementById(`status-${p}`);
                        const count = result.results[p]?.length || 0;
                        
                        if (p === '1688') {
                            statusEl.innerHTML = `ℹ️ 请使用脚本采集 <a href="#" onclick="alert('1. 访问 1688.com\\n2. 搜索：${keyword}\\n3. 按 F12\\n4. 运行 scripts/extract_1688_auto.js\\n5. 保存 JSON 文件')" style="color: #667eea; text-decoration: underline;">📝 查看说明</a>`;
                        } else if (count > 0) {
                            statusEl.textContent = `✅ 完成 (${count}个)`;
                        } else {
                            statusEl.textContent = `⚠️ 无结果 (需 API 密钥)`;
                        }
                    });
                    
                    const total = Object.values(result.results || {}).reduce((sum, arr) => sum + arr.length, 0);
                    
                    setTimeout(() => {
                        alert(`采集完成！\n\n总计：${total} 个商品\n关键词：${keyword}\n\n1688 商品请使用脚本采集，其他平台需要配置 API 密钥。`);
                    }, 500);
                }
                
                btn.disabled = false;
                btn.textContent = '🚀 开始采集';
                
            } catch (e) {
                console.error('采集失败:', e);
                btn.disabled = false;
                btn.textContent = '🚀 开始采集';
                alert('采集失败：' + e.message + '\n\n提示：Temu/Amazon 需要配置 API 密钥，1688 请使用人工辅助脚本。');
            }
        }

        // 加载统计
        async function loadStats() {
            try {
                const res = await fetch('/api/stats');
                const stats = await res.json();
                document.getElementById('totalProducts').textContent = stats.total_products;
                document.getElementById('unanalyzedCount').textContent = stats.unanalyzed_count;
                document.getElementById('analyzedCount').textContent = stats.analyzed_count;
                document.getElementById('recommendedCount').textContent = stats.recommended_count;
                document.getElementById('avgProfitMargin').textContent = stats.avg_profit_margin ? stats.avg_profit_margin.toFixed(1) + '%' : '-';
                document.getElementById('unanalyzedTabCount').textContent = stats.unanalyzed_count;
                document.getElementById('analyzedTabCount').textContent = stats.analyzed_count;
            } catch (e) {
                console.error('加载统计失败:', e);
            }
        }

        // 加载商品
        async function loadProducts() {
            try {
                const [unanalyzedRes, analyzedRes] = await Promise.all([
                    fetch('/api/products/unanalyzed?limit=50'),
                    fetch('/api/products/analyzed?limit=50')
                ]);
                unanalyzedProducts = await unanalyzedRes.json();
                analyzedProducts = await analyzedRes.json();
                renderProducts();
            } catch (e) {
                console.error('加载商品失败:', e);
                document.getElementById('productList').innerHTML = '<div class="empty-state">加载失败</div>';
            }
        }

        // 渲染商品列表
        function renderProducts() {
            const container = document.getElementById('productList');
            const products = currentTab === 'unanalyzed' ? unanalyzedProducts : analyzedProducts;
            
            if (!products || products.length === 0) {
                container.innerHTML = `<div class="empty-state">${currentTab === 'unanalyzed' ? '没有未分析的商品' : '没有已分析的商品'}</div>`;
                return;
            }
            
            container.innerHTML = products.map(p => {
                const isSelected = selectedProducts.has(p.id);
                const checkbox = currentTab === 'unanalyzed' ? 
                    `<input type="checkbox" class="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleProduct(${p.id}, event)">` :
                    '';
                
                if (currentTab === 'unanalyzed') {
                    return `
                        <div class="product-item ${isSelected ? 'selected' : ''}" onclick="toggleProduct(${p.id}, event)">
                            ${checkbox}
                            <img class="product-image" src="${p.image_url || ''}" referrerpolicy="no-referrer" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%23d1d5db%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z%22%3E%3C/path%3E%3C/svg%3E'" alt="${p.title}">
                            <div class="product-info">
                                <div class="product-title">${p.title || '未知商品'}</div>
                                <div class="product-meta">
                                    <span class="price">供货：${p.supplier_price || '-'}</span>
                                    <span>销量：${p.sales_volume || '未知'}</span>
                                </div>
                            </div>
                        </div>
                    `;
                } else {
                    const isSelected = selectedProducts.has(p.id);
                    return `
                        <div class="product-item ${isSelected ? 'selected' : ''}" onclick="toggleProduct(${p.id}, event)">
                            <input type="checkbox" class="checkbox" ${isSelected ? 'checked' : ''} onclick="toggleProduct(${p.id}, event); event.stopPropagation();">
                            <img class="product-image" src="${p.image_url || ''}" referrerpolicy="no-referrer" onerror="this.src='data:image/svg+xml,%3Csvg xmlns=%22http://www.w3.org/2000/svg%22 fill=%22none%22 viewBox=%220 0 24 24%22 stroke=%22%23d1d5db%22%3E%3Cpath stroke-linecap=%22round%22 stroke-linejoin=%22round%22 stroke-width=%222%22 d=%22M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z%22%3E%3C/path%3E%3C/svg%3E'" alt="${p.title}">
                            <div class="product-info">
                                <div class="product-title">${p.title || '未知商品'}</div>
                                <div class="product-meta">
                                    <span class="price">供货：${p.supplier_price || '-'}</span>
                                    <span>零售：${p.retail_price || '-'}</span>
                                    <span class="profit">利润：${p.profit_margin?.toFixed(1) || 0}%</span>
                                </div>
                                ${p.recommend ? '<span class="badge badge-success">✅ 推荐</span>' : '<span class="badge badge-warning">❌ 不推荐</span>'}
                            </div>
                        </div>
                    `;
                }
            }).join('');
        }

        // 切换标签
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
            event.target.classList.add('active');
            
            // 更新全选框文字和显示状态
            const selectAllContainer = document.getElementById('selectAllContainer');
            const selectAllText = document.getElementById('selectAllText');
            
            if (currentMainTab === 'products') {
                // 商品管理标签下显示全选框
                if (selectAllContainer) selectAllContainer.style.display = 'flex';
                if (selectAllText) {
                    selectAllText.textContent = tab === 'unanalyzed' ? 
                        '全选（用于批量分析）' : 
                        '全选（重新分析）';
                }
            } else {
                // 采集标签下隐藏全选框
                if (selectAllContainer) selectAllContainer.style.display = 'none';
            }
            
            selectedProducts.clear();
            document.getElementById('selectAll').checked = false;
            renderProducts();
        }

        // 选择商品
        function toggleProduct(id, event) {
            if (event.target.type === 'checkbox') {
                event.stopPropagation();
            }
            if (selectedProducts.has(id)) {
                selectedProducts.delete(id);
            } else {
                selectedProducts.add(id);
            }
            renderProducts();
            updateAnalyzeHint();
        }

        // 全选
        function toggleSelectAll() {
            const checked = document.getElementById('selectAll').checked;
            if (checked) {
                unanalyzedProducts.forEach(p => selectedProducts.add(p.id));
            } else {
                selectedProducts.clear();
            }
            renderProducts();
            updateAnalyzeHint();
        }

        // 更新提示
        function updateAnalyzeHint() {
            const count = selectedProducts.size;
            const hint = document.getElementById('analyzeHint');
            if (count > 0) {
                // 检查选中的是已分析还是未分析商品
                const analyzedSelected = Array.from(selectedProducts).some(id => 
                    analyzedProducts.some(p => p.id === id)
                );
                const unanalyzedSelected = Array.from(selectedProducts).some(id => 
                    unanalyzedProducts.some(p => p.id === id)
                );
                
                if (analyzedSelected && unanalyzedSelected) {
                    hint.textContent = `已选择 ${count} 个商品（混合）进行分析`;
                } else if (analyzedSelected) {
                    hint.textContent = `已选择 ${count} 个已分析商品重新分析`;
                } else {
                    hint.textContent = `已选择 ${count} 个未分析商品进行分析`;
                }
            } else {
                hint.textContent = '选择商品分析，或留空自动分析未分析商品（最多 10 个）';
            }
        }

        // 初始化全选框状态
        const selectAllContainer = document.getElementById('selectAllContainer');
        if (selectAllContainer && currentMainTab !== 'products') {
            selectAllContainer.style.display = 'none';
        }

        // 开始分析
        async function startAnalysis() {
            const btn = document.getElementById('analyzeBtn');
            const progressBar = document.getElementById('progressBar');
            const progressFill = document.getElementById('progressFill');
            const progressText = document.getElementById('progressText');
            
            btn.disabled = true;
            btn.textContent = '分析中...';
            progressBar.style.display = 'block';
            
            try {
                const payload = {
                    product_ids: selectedProducts.size > 0 ? Array.from(selectedProducts) : null,
                    min_profit_margin: 0.3
                };
                
                const res = await fetch('/api/analyze', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(payload)
                });
                
                const task = await res.json();
                currentTaskId = task.task_id;
                
                if (task.status === 'completed' && task.message.includes('没有未分析')) {
                    alert('⚠️ ' + task.message);
                    btn.disabled = false;
                    btn.textContent = '开始分析';
                    progressBar.style.display = 'none';
                    return;
                }
                
                // 轮询状态
                pollTaskStatus();
                
            } catch (e) {
                console.error('分析失败:', e);
                btn.disabled = false;
                btn.textContent = '开始分析';
                progressBar.style.display = 'none';
                alert('启动分析失败，请重试');
            }
        }

        // 轮询任务状态
        async function pollTaskStatus() {
            if (!currentTaskId) return;
            
            try {
                const res = await fetch(`/api/tasks/${currentTaskId}`);
                const status = await res.json();
                
                const progressFill = document.getElementById('progressFill');
                const progressText = document.getElementById('progressText');
                const btn = document.getElementById('analyzeBtn');
                
                progressFill.style.width = `${status.progress}%`;
                progressText.textContent = status.message;
                
                if (status.status === 'completed' || status.status === 'failed') {
                    currentTaskId = null;
                    btn.disabled = false;
                    btn.textContent = '开始分析';
                    document.getElementById('progressBar').style.display = 'none';
                    progressText.textContent = '';
                    
                    if (status.status === 'completed') {
                        alert('✅ 分析完成！');
                        selectedProducts.clear();
                        document.getElementById('selectAll').checked = false;
                        loadProducts();
                        loadStats();
                        loadLatestResult();
                    } else {
                        alert('❌ 分析失败：' + status.message);
                    }
                }
            } catch (e) {
                console.error('轮询失败:', e);
            }
        }

        // 加载最近结果
        async function loadLatestResult() {
            try {
                const res = await fetch('/api/analysis/latest');
                const result = await res.json();
                
                const resultBox = document.getElementById('latestResult');
                const noResultText = document.getElementById('noResultText');
                
                if (result.has_result) {
                    resultBox.style.display = 'block';
                    noResultText.style.display = 'none';
                    document.getElementById('resultTotal').textContent = result.total_analyzed;
                    document.getElementById('resultRecommended').textContent = result.recommended_count;
                    document.getElementById('resultAvgMargin').textContent = result.avg_profit_margin.toFixed(1);
                } else {
                    resultBox.style.display = 'none';
                    noResultText.style.display = 'block';
                }
            } catch (e) {
                console.error('加载结果失败:', e);
            }
        }
    </script>
</body>
</html>
